<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbit EDU MVP</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="app" class="app" aria-live="polite"></main>

    <template id="auth-template">
      <section class="auth-shell">
        <div class="panel auth-card">
          <p class="eyebrow">ORBIT EDU</p>
          <h1>Космический образовательный трек</h1>
          <p class="muted">Войдите в систему и пройдите путь от материалов до награды.</p>

          <nav class="tabs" aria-label="Авторизация">
            <a href="/auth/login" data-link class="tab" data-tab="login">Вход</a>
            <a href="/auth/register" data-link class="tab" data-tab="register">Регистрация</a>
          </nav>

          <form id="login-form" class="form-grid hidden">
            <label>Email<input id="login-email" type="email" required placeholder="cadet@orbit.edu" /></label>
            <label>Пароль<input id="login-password" type="password" minlength="4" required /></label>
            <button class="btn btn-solid" type="submit">Войти</button>
          </form>

          <form id="register-form" class="form-grid hidden">
            <label>Имя<input id="register-name" type="text" required placeholder="Курсант" /></label>
            <label>Email<input id="register-email" type="email" required placeholder="cadet@orbit.edu" /></label>
            <label>Пароль<input id="register-password" type="password" minlength="4" required /></label>
            <button class="btn btn-solid" type="submit">Зарегистрироваться</button>
          </form>

          <p id="auth-message" class="status"></p>
        </div>
      </section>
    </template>

    <template id="home-template">
      <section class="hero-space" id="hero-space">
        <div class="hero-copy">
          <p class="eyebrow">Маршрут: вход → изучение → тест → награда</p>
          <h2 id="welcome-heading"></h2>
          <p class="muted">Без классического верхнего header: навигация — это орбиты и планеты.</p>
        </div>

        <div class="space-controls">
          <a data-link href="/profile" class="btn">Профиль</a>
          <button id="logout-btn" class="btn" type="button">Выйти</button>
        </div>

        <div id="planet-nav" class="planet-nav" aria-label="Навигация по разделам"></div>
      </section>

      <section class="panel" id="section-shell"></section>

      <section class="panel forum-preview" id="forum-preview">
        <div class="section-head">
          <h3>Форум экипажа</h3>
          <a href="/forum" data-link class="btn btn-solid">Открыть форум</a>
        </div>
        <p class="muted">Это второй экран после блока с планетами — пролистайте вниз и обсуждайте темы.</p>
        <div id="forum-preview-list" class="stack"></div>
      </section>
    </template>

    <template id="profile-template">
      <section class="page-head">
        <div>
          <p class="eyebrow">Личный кабинет</p>
          <h2 id="profile-name"></h2>
        </div>
        <a href="/" data-link class="btn">На главную</a>
      </section>

      <section class="panel metrics" id="profile-metrics"></section>

      <section class="panel">
        <div class="section-head">
          <h3>Разделы профиля</h3>
          <div class="chip-row">
            <a href="/profile/history" data-link class="chip">История</a>
            <a href="/profile/projects" data-link class="chip">Проекты</a>
            <a href="/profile/career" data-link class="chip">Карьера</a>
            <a href="/profile/achievements" data-link class="chip">Достижения</a>
          </div>
        </div>
        <article id="profile-subpage" class="card"></article>
      </section>

      <section class="panel">
        <h3>Загрузка достижения</h3>
        <form id="achievement-form" class="form-grid inline-form">
          <label>Название<input id="achievement-title" type="text" required placeholder="Сертификат по астронавигации" /></label>
          <label>Файл<input id="achievement-file" type="file" required /></label>
          <button class="btn btn-solid" type="submit">Сохранить</button>
        </form>
        <div id="achievements-list" class="stack"></div>
      </section>

      <section class="panel">
        <h3>Лента активности</h3>
        <div id="activity-list" class="stack"></div>
      </section>
    </template>

    <template id="forum-template">
      <section class="page-head">
        <div>
          <p class="eyebrow">Форум</p>
          <h2>Обсуждение космических тем</h2>
        </div>
        <a href="/" data-link class="btn">На главную</a>
      </section>

      <section class="panel">
        <form id="forum-topic-form" class="form-grid inline-form">
          <label>Тема<input id="topic-title" type="text" required placeholder="Например: миссии на Луну" /></label>
          <label>Сообщение<textarea id="topic-message" rows="3" required placeholder="Ваше сообщение"></textarea></label>
          <button class="btn btn-solid" type="submit">Создать тему</button>
        </form>
      </section>

      <section id="forum-list" class="stack"></section>
    </template>

    <script src="data/content-data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
