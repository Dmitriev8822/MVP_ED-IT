<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space EDU MVP</title><link rel="stylesheet" href="/style.css" />
</head>
<body data-page="home">
  <main>
    <section class="page home-hero">
      <div class="panel" style="width:100%">
        <div class="section-header">
          <div>
            <h1>Космический образовательный портал</h1>
            <p class="muted">Привет, <span id="hello-user"></span> · Баллы: <span id="user-points"></span></p>
          </div>
          <button id="logout-btn" class="btn btn-muted">Выйти</button>
        </div>
        <div class="planets">
          <a class="planet" data-planet="history" href="/sections/history/"><strong>История</strong><small class="planet-progress">0%</small></a>
          <a class="planet" data-planet="modern" href="/sections/modern/"><strong>Современность</strong><small class="planet-progress">0%</small></a>
          <a class="planet" data-planet="news" href="/sections/news/"><strong>Новости</strong><small class="planet-progress">0%</small></a>
          <a class="planet" data-planet="success" href="/sections/success/"><strong>Истории успеха</strong><small class="planet-progress">0%</small></a>
          <a class="planet" data-planet="profile" href="/profile/"><strong>Профиль</strong><small class="planet-progress">→</small></a>
        </div>
      </div>
    </section>

    <section class="page forum-screen">
      <div class="panel">
        <h2>Форум (упрощенный)</h2>
        <p class="muted">Прокрутите вниз после планет — здесь обсуждения учеников.</p>
        <div id="forum-preview" class="grid grid-2"></div>
      </div>
    </section>
  </main>
  <script src="/data/mock-data.js"></script><script src="/js/storage.js"></script><script src="/js/auth.js"></script><script src="/js/progress.js"></script><script src="/js/forum.js"></script><script src="/js/main.js"></script>
</body>
</html>
