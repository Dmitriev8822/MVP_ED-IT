<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Космос.Rus — интерактивный прототип</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="app">
      <section id="auth-view" class="view view-active" aria-live="polite">
        <div class="panel auth-panel">
          <img src="assets/logo.svg" alt="Логотип Космос.Rus" class="logo" />
          <h1>Добро пожаловать в Космос.Rus</h1>
          <p class="section-intro">Полный сценарий: регистрация → вход → ЛК → выполнение шагов → получение награды.</p>

          <div class="auth-switch" role="tablist" aria-label="Выбор режима авторизации">
            <button id="show-login" class="primary-btn is-active" role="tab" aria-selected="true">Вход</button>
            <button id="show-register" class="primary-btn" role="tab" aria-selected="false">Регистрация</button>
          </div>

          <form id="login-form" class="auth-form">
            <label>
              Email
              <input type="email" id="login-email" required placeholder="student@space.ru" />
            </label>
            <label>
              Пароль
              <input type="password" id="login-password" required minlength="4" placeholder="••••" />
            </label>
            <button type="submit" class="primary-btn">Войти</button>
          </form>

          <form id="register-form" class="auth-form hidden">
            <label>
              Имя
              <input type="text" id="register-name" required placeholder="Иван Иванов" />
            </label>
            <label>
              Email
              <input type="email" id="register-email" required placeholder="student@space.ru" />
            </label>
            <label>
              Пароль
              <input type="password" id="register-password" required minlength="4" placeholder="Минимум 4 символа" />
            </label>
            <button type="submit" class="primary-btn">Создать аккаунт</button>
          </form>

          <p id="auth-message" class="quiz-result"></p>
        </div>
      </section>

      <section id="cabinet-view" class="view" aria-live="polite">
        <div class="hero-mark">
          <h1>Личный кабинет</h1>
          <p id="welcome-title" class="section-intro"></p>
          <div class="hero-stats">
            <div>
              <span class="pixel-label">Общий прогресс</span>
              <strong id="overall-progress">0%</strong>
            </div>
            <div>
              <span class="pixel-label">Рейтинг</span>
              <strong id="overall-rating">0</strong>
            </div>
            <div>
              <span class="pixel-label">Награды</span>
              <strong id="reward-count">0</strong>
            </div>
          </div>
          <button id="logout-btn" class="back-btn">Выйти</button>
        </div>

        <div class="section-tabs" id="section-tabs"></div>

        <article class="panel">
          <h2 id="section-title"></h2>
          <p id="section-description" class="section-intro"></p>
          <div id="tasks-list" class="profile-sections"></div>
        </article>

        <article class="panel reward-panel">
          <h2>Получение награды</h2>
          <p class="section-intro">Когда все разделы ЛК закрыты на 100%, можно забрать финальную награду.</p>
          <button id="claim-reward-btn" class="primary-btn">Получить награду</button>
          <p id="reward-message" class="quiz-result"></p>
          <div id="reward-badges" class="reward-badges"></div>
        </article>
      </section>
    </main>

    <script src="data/content-data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
